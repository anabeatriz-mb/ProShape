openapi: 3.0.0
info:
title: API Academia
version: "1.0"
description: API para gerenciamento de alunos com autenticação

servers:

* url: http://127.0.0.1:5000
  description: Servidor local

paths:

/:
get:
summary: Rota inicial
responses:
"200":
description: Informações da API

/login:
post:
summary: Realizar login
requestBody:
required: true
content:
application/json:
schema:
type: object
properties:
usuario:
type: string
senha:
type: string
responses:
"200":
description: Login realizado com sucesso
"400":
description: Dados inválidos
"401":
description: Usuário ou senha inválidos

/cadastro:
post:
summary: Cadastrar novo aluno
security:
- bearerAuth: []
requestBody:
required: true
content:
application/json:
schema:
type: object
required:
- nome
- cpf
properties:
nome:
type: string
cpf:
type: string
status:
type: string
example: ativo
responses:
"201":
description: Aluno cadastrado com sucesso
"400":
description: Dados inválidos

/alunos:
get:
summary: Listar todos os alunos
responses:
"200":
description: Lista de alunos

/alunos/{id}:
get:
summary: Buscar aluno por ID
parameters:
- name: id
in: path
required: true
schema:
type: integer
responses:
"200":
description: Aluno encontrado
"404":
description: Aluno não encontrado

```
patch:
  summary: Editar aluno
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            nome:
              type: string
            cpf:
              type: string
            status:
              type: string
  responses:
    "200":
      description: Aluno atualizado
    "400":
      description: Dados inválidos
    "404":
      description: Aluno não encontrado

delete:
  summary: Excluir aluno
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    "200":
      description: Aluno excluído
    "404":
      description: Aluno não encontrado
```

/alunos/cpf/{cpf}:
get:
summary: Buscar aluno por CPF
parameters:
- name: cpf
in: path
required: true
schema:
type: string
responses:
"200":
description: Aluno encontrado
"404":
description: Aluno não encontrado

components:
securitySchemes:
bearerAuth:
type: http
scheme: bearer
bearerFormat: JWT
